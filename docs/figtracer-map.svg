<svg viewBox="0 0 760 416" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>figtracer: start with the figure loop, grow into the full system</title>
  <desc>Tier one, the figure loop you benefit from immediately: your analysis in R or Python saves figures which flow through MANIFEST.jsonl into a living lab note that auto-resyncs. Tier two, optional: figtracer new, protocol.yaml, Mission Control, and figtracer sync.</desc>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- ===== Tier 1: the wedge (accent) ===== -->
  <rect x="16" y="34" width="728" height="160" rx="12" fill="#eff5ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="34" y="60" font-size="14" font-weight="700" fill="#1d4ed8">① Start here — figures → living notes · benefit today</text>

  <rect x="34" y="86" width="204" height="84" rx="9" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="136" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Your analysis</text>
  <text x="136" y="143" text-anchor="middle" font-size="11.5" fill="#6b7280">R saveFig()</text>
  <text x="136" y="158" text-anchor="middle" font-size="11.5" fill="#6b7280">Python savefig()</text>

  <line x1="238" y1="128" x2="286" y2="128" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="262" y="120" text-anchor="middle" font-size="10.5" fill="#6b7280">save</text>

  <rect x="288" y="86" width="176" height="84" rx="9" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="376" y="122" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">MANIFEST.jsonl</text>
  <text x="376" y="145" text-anchor="middle" font-size="11.5" fill="#6b7280">the shared seam</text>

  <line x1="464" y1="128" x2="512" y2="128" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="488" y="120" text-anchor="middle" font-size="10.5" fill="#6b7280">embed</text>

  <rect x="514" y="86" width="212" height="84" rx="9" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="620" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Living lab note</text>
  <text x="620" y="145" text-anchor="middle" font-size="11.5" fill="#6b7280">re-syncs on every re-run</text>

  <!-- connector -->
  <line x1="380" y1="196" x2="380" y2="240" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="392" y="222" font-size="10.5" fill="#6b7280">when you want more</text>

  <!-- ===== Tier 2: the system (neutral) ===== -->
  <rect x="16" y="246" width="728" height="154" rx="12" fill="#f5f5f6" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="34" y="272" font-size="14" font-weight="700" fill="#111827">② Grow into the full experiment system — optional</text>

  <rect x="34" y="296" width="162" height="82" rx="9" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="115" y="332" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">figtracer new</text>
  <text x="115" y="352" text-anchor="middle" font-size="11" fill="#6b7280">scaffold experiment</text>

  <rect x="212" y="296" width="162" height="82" rx="9" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="293" y="332" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">protocol.yaml</text>
  <text x="293" y="352" text-anchor="middle" font-size="11" fill="#6b7280">→ bench sheet</text>

  <rect x="390" y="296" width="162" height="82" rx="9" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="471" y="332" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Mission Control</text>
  <text x="471" y="352" text-anchor="middle" font-size="11" fill="#6b7280">project dashboard</text>

  <rect x="568" y="296" width="162" height="82" rx="9" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="649" y="332" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">figtracer sync</text>
  <text x="649" y="352" text-anchor="middle" font-size="11" fill="#6b7280">→ git commit</text>
</svg>

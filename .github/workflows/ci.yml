name: CI

permissions:
  contents: read

# Run the test suite on every push to main and every pull request, so a
# regression in sync / config / figtools is caught before it reaches a live
# experiment's workflow.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  package:
    name: Clean wheel smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - name: Verify source distribution resources
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile

          archive = next(Path("dist").glob("*.tar.gz"))
          with tarfile.open(archive) as source_dist:
              names = source_dist.getnames()
          assert any(name.endswith("/r/figtracer.R") for name in names)
          assert any(name.endswith("/figtracer/resources/figtracer.R") for name in names)
          PY
      - name: Install wheel without development extras
        run: |
          python -m venv /tmp/figtracer-wheel-smoke
          wheel="$(python -c 'from pathlib import Path; print(next(Path("dist").glob("*.whl")))')"
          /tmp/figtracer-wheel-smoke/bin/python -m pip install "$wheel"
          /tmp/figtracer-wheel-smoke/bin/python -m pip check
      - name: Exercise installed entry points and resources
        working-directory: /tmp
        run: |
          /tmp/figtracer-wheel-smoke/bin/figtracer --help
          /tmp/figtracer-wheel-smoke/bin/labkit --help
          /tmp/figtracer-wheel-smoke/bin/figtools --help
          /tmp/figtracer-wheel-smoke/bin/python - <<'PY'
          from importlib.resources import files

          from PIL import Image
          import figtools.verify
          from figtracer.resources import r_shim_path, r_shim_resource

          assert Image is not None
          assert files("figtools").joinpath("config/journals.yaml").is_file()
          assert files("labkit").joinpath("config/projects.example.yaml").is_file()
          assert files("labkit").joinpath("templates/wetlab_experiment.md").is_file()
          assert r_shim_resource().is_file()
          with r_shim_path() as path:
              assert path.is_file()
              assert "saveFig <- function" in path.read_text()
          PY
